<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena - 200 Battle Royale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center; color: white;
        }

        .btn {
            padding: 18px 55px; font-size: 26px; font-weight: bold; color: white;
            border: none; border-radius: 50px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            text-transform: uppercase; margin-top: 20px;
        }

        .play-btn { background: linear-gradient(45deg, #00f2ff, #0061ff); }
        .retry-btn { background: linear-gradient(45deg, #ff416c, #ff4b2b); }

        #hud {
            position: fixed; top: 20px; width: 100%; display: flex; 
            justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 50;
        }
        .stat-box { color: #00f2ff; font-weight: bold; font-size: 18px; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1 style="color: #00f2ff; font-size: 45px; margin-bottom: 10px;">BATTLE ARENA</h1>
        <p>200 HUNGRY SNAKES</p>
        <button class="btn play-btn" onclick="startGame()">ENTER BATTLE</button>
    </div>

    <div id="die-screen" class="overlay" style="display: none;">
        <h1 style="color: #ff416c; font-size: 50px; text-shadow: 0 0 20px red;">WASTED!</h1>
        <p id="final-score" style="font-size: 22px; margin-top: 10px;"></p>
        <button class="btn retry-btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <div id="hud">
        <div class="stat-box">SURVIVORS: <span id="count">200</span></div>
        <div class="stat-box">MY SIZE: <span id="size">20</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const countDisp = document.getElementById('count');
const sizeDisp = document.getElementById('size');

let viewW, viewH, worldW, worldH;
let snakes = [];
let gameActive = false;
let cameraZoom = 1;
let lastTouchX = 0, lastTouchY = 0;
const sensitivity = 7.5; 

const faces = ['😡', '😈', '💀', '👽', '😼', '🤖', '🤡', '👺'];
const gradients = [['#00f2ff', '#0061ff'], ['#ff416c', '#ff4b2b'], ['#a8ff78', '#78ffd6']];

function initMap() {
    viewW = window.innerWidth; viewH = window.innerHeight;
    canvas.width = viewW; canvas.height = viewH;
    worldW = 4500; worldH = 4500; // Big map for 200 snakes
}

class Snake {
    constructor(isPlayer = false) {
        this.isPlayer = isPlayer;
        this.spawn();
    }
    spawn() {
        this.segments = [];
        this.radius = this.isPlayer ? 20 : (Math.random() * 15 + 10);
        let rx = Math.random() * (worldW - 1000) + 500;
        let ry = Math.random() * (worldH - 1000) + 500;
        this.angle = Math.random() * Math.PI * 2;
        this.targetAngle = this.angle;
        this.speed = 4.2; 
        this.color = gradients[Math.floor(Math.random() * gradients.length)];
        this.face = faces[Math.floor(Math.random() * faces.length)];
        this.isDying = false;
        for(let i=0; i<30; i++) this.segments.push({x: rx, y: ry});
    }
    update() {
        if (this.isDying) {
            this.segments.pop();
            return;
        }

        // HUNGRY AI: Bots seek food or chase smaller snakes
        if (!this.isPlayer && Math.random() < 0.03) {
            this.targetAngle += (Math.random() - 0.5) * 1.5;
        }

        let diff = this.targetAngle - this.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        this.angle += diff * 0.15; 

        let nextX = this.segments[0].x + Math.cos(this.angle) * this.speed;
        let nextY = this.segments[0].y + Math.sin(this.angle) * this.speed;

        // Boundary Clamp
        if (nextX < this.radius) { nextX = this.radius; this.targetAngle = 0; }
        if (nextX > worldW - this.radius) { nextX = worldW - this.radius; this.targetAngle = Math.PI; }
        if (nextY < this.radius) { nextY = this.radius; this.targetAngle = Math.PI/2; }
        if (nextY > worldH - this.radius) { nextY = worldH - this.radius; this.targetAngle = -Math.PI/2; }

        this.segments.unshift({x: nextX, y: nextY});
        this.segments.pop();
    }
    draw() {
        if (this.segments.length < 1) return;
        ctx.strokeStyle = this.color[0];
        ctx.lineWidth = this.radius * 2;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(this.segments[0].x, this.segments[0].y);
        for(let i=1; i<this.segments.length; i++) ctx.lineTo(this.segments[i].x, this.segments[i].y);
        ctx.stroke();
        ctx.font = `${this.radius * 1.5}px Arial`;
        ctx.textAlign = 'center'; 
        ctx.fillText(this.face, this.segments[0].x, this.segments[0].y + (this.radius*0.5));
    }
}

window.addEventListener('touchstart', (e) => {
    lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
});
window.addEventListener('touchmove', (e) => {
    if (!gameActive || !snakes[0]) return;
    let dx = (e.touches[0].clientX - lastTouchX) * sensitivity;
    let dy = (e.touches[0].clientY - lastTouchY) * sensitivity;
    if (Math.hypot(dx, dy) > 2) snakes[0].targetAngle = Math.atan2(dy, dx);
    e.preventDefault();
}, {passive: false});

function solveCollisions() {
    for (let i = 0; i < snakes.length; i++) {
        let s1 = snakes[i];
        if (s1.isDying) continue;
        for (let j = 0; j < snakes.length; j++) {
            let s2 = snakes[j];
            if (i === j || s2.isDying) continue;

            // Spatial optimization: only check nearby
            if (Math.abs(s1.segments[0].x - s2.segments[0].x) > 800) continue;

            for (let k = 0; k < s2.segments.length; k += 8) {
                let d = Math.hypot(s1.segments[0].x - s2.segments[k].x, s1.segments[0].y - s2.segments[k].y);
                if (d < s1.radius + s2.radius) {
                    if (s1.radius < s2.radius) {
                        s1.isDying = true;
                        s2.radius += 1.3;
                        for(let m=0; m<10; m++) s2.segments.push({...s2.segments[s2.segments.length-1]});
                        if (s1.isPlayer) showDeathScreen();
                        break;
                    }
                }
            }
        }
    }
}

function gameLoop() {
    if (!gameActive) return;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, viewW, viewH);

    let player = snakes.find(s => s.isPlayer);
    let camTarget = player || snakes[0];

    cameraZoom = Math.max(0.12, 1 / (1 + (camTarget.radius - 20) * 0.02));
    let camX = viewW/2 - camTarget.segments[0].x * cameraZoom;
    let camY = viewH/2 - camTarget.segments[0].y * cameraZoom;

    ctx.setTransform(cameraZoom, 0, 0, cameraZoom, camX, camY);
    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 50; ctx.strokeRect(0, 0, worldW, worldH);

    snakes = snakes.filter(s => !s.isDying || s.segments.length > 0);
    snakes.forEach(s => { s.update(); s.draw(); });
    solveCollisions();

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    countDisp.innerText = snakes.length;
    sizeDisp.innerText = player ? Math.floor(player.radius) : "RIP";
    
    requestAnimationFrame(gameLoop);
}

function startGame() {
    initMap();
    snakes = [new Snake(true)]; // Player
    for(let i=0; i<199; i++) snakes.push(new Snake(false)); // Add 199 Bots
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('die-screen').style.display = 'none';
    gameActive = true;
    requestAnimationFrame(gameLoop);
}

function showDeathScreen() {
    gameActive = false;
    document.getElementById('final-score').innerText = "Survivors Left: " + snakes.length;
    document.getElementById('die-screen').style.display = 'flex';
}

initMap();
window.addEventListener('resize', initMap);
</script>
</body>
</html>
